version: "2"
linters:
  enable:
    - gocritic
    - gosec
    - revive
    - unconvert
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
    gocritic:
      disabled-checks:
        - ifElseChain
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    staticcheck:
      checks:
        - all
        - -QF1002  # could-use-tagged-switch — stylistic quick-fix, not a bug
        - -QF1003  # could-use-tagged-switch — stylistic quick-fix, not a bug
        - -QF1012  # allow WriteString(fmt.Sprintf(...)) — pre-existing style throughout codebase
        - -ST1000  # package comments — covered by revive with rule disabled
        - -ST1003  # underscore in names — pre-existing style in some test helpers
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test.go
      - linters:
          - gosec
        text: G204
      - linters:
          - gosec
        text: G301
      - linters:
          - gosec
        text: G304
      - linters:
          - gosec
        text: G104
      - linters:
          - gosec
        text: G302
      - linters:
          - gosec
        text: G306
      - linters:
          - gosec
        text: G702
      - linters:
          - gosec
        text: G703  # path traversal via taint — variable paths are expected for the CLI's config and template I/O (parallels existing G304 exception for reads)
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
