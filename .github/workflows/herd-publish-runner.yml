name: Herd Publish Runner Image
on:
  # Manual-only by design. Tag-driven rebuilds happen via the
  # publish-runner-image job in release.yml (see #711). A push trigger on
  # `Dockerfile.herd_runner` would cause a second wrapper-image build for
  # any release that also touches the file — see #713 for the
  # discussion.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: vars.HERD_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push customized runner image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/${OWNER}/${REPO}-herd-runner
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile.herd_runner \
            -t ${IMAGE}:latest \
            --push .
