name: HerdOS Monitor
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  patrol:
    runs-on: [self-hosted, herd-worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patrol
        env:
          HERD_RUNNER: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          herd monitor patrol
