name: HerdOS Monitor
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  patrol:
    if: vars.HERD_ENABLED == 'true'
    runs-on: [self-hosted, '${{ vars.HERD_RUNNER_LABEL || ''herd-worker'' }}']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patrol
        env:
          HERD_RUNNER: "true"
        run: |
          herd monitor patrol
