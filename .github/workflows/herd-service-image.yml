name: Herd Service Image

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Dockerfile.herd_service'
      - '.github/workflows/herd-service-image.yml'
      - 'cmd/herd-service/**'
      - 'internal/service/**'
      - 'internal/controlplane/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  IMAGE: ghcr.io/herd-os/herd-service

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build service image
        run: make image-service-build HERD_SERVICE_IMAGE=herd-service:smoke
      - name: Verify service image user
        run: |
          USER=$(docker image inspect herd-service:smoke --format '{{.Config.User}}')
          test "$USER" = "nonroot:nonroot"
      - name: Smoke test /healthz
        run: make image-service-smoke HERD_SERVICE_IMAGE=herd-service:smoke HERD_SERVICE_SKIP_BUILD=1

  publish:
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push service image
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION=${VERSION} \
            -f Dockerfile.herd_service \
            -t ${IMAGE}:${VERSION} \
            -t ${IMAGE}:latest \
            --push .
