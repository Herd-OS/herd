name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -race

      - name: Vet
        run: go vet ./...

      - name: Check workflow drift
        run: |
          go build -o ./herd ./cmd/herd
          if ! ./herd init --check; then
            echo "::error::Workflow files have drifted from the embedded templates in internal/cli/workflows/*.tmpl. Either (a) update the corresponding template, OR (b) revert your direct edits to .github/workflows/*. Templates are the source of truth — run './herd init' after editing a template to regenerate the workflow file."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: go test ./internal/platform/github/... -tags=integration -count=1 -v
        env:
          GITHUB_TOKEN: ${{ secrets.HERD_GITHUB_TOKEN }}
          HERD_TEST_OWNER: ${{ vars.HERD_TEST_OWNER }}
          HERD_TEST_REPO: ${{ vars.HERD_TEST_REPO }}
